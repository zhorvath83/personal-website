name: Build and push CV 
 
on:
  push:
    paths:
      - 'resume/resume.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Devleaps/jsonresume-generator@v1
        id: jsonresume-html-generator
        with:
          action: render
          file: resume.json
          folder: resume/
          output-type: html
          theme-local: false
          theme-name: jsonresume-theme-reactive
      
      - run: |
          cd resume
          chmod 0777 resume.html
          ls -la

      - name: Modify resume.html
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            
            // Fájl útvonal
            const filePath = path.join(process.cwd(), "resume/resume.html");
            
            // Olvassuk be a fájlt
            let content = fs.readFileSync(filePath, "utf8");
            
            // Cseréljük le a title-t
            content = content.replace(/<title>.*?<\/title>/, "<title>CV 👨‍💼 | HorvathZoltan.me</title>");
            
            // Cseréljük le a favicon-t
            const faviconReplacement = `<link rel="icon" href="https://horvathzoltan.me/favicon.ico">
          <link rel="icon" type="image/png" sizes="16x16" href="https://horvathzoltan.me/favicon-16x16.png">
          <link rel="icon" type="image/png" sizes="32x32" href="https://horvathzoltan.me/favicon-32x32.png">
          <link rel="apple-touch-icon" href="https://horvathzoltan.me/favicon-apple-touch-icon.png">`;
            content = content.replace(/<link rel="icon".*?\/>/, faviconReplacement);
            
            // PDF oldaltörés javítás - CSS patch beszúrása
            const printCssFix = `<style>
          @media print {
            /* Remove page-break-inside: avoid from sections to allow proper page breaks */
            section, article {
              page-break-inside: auto !important;
            }
            
            /* Keep headers with their content */
            h1, h2, h3, h4, h5, h6 {
              page-break-after: avoid !important;
            }
            
            /* Avoid breaking inside individual work items */
            section > div > article {
              page-break-inside: avoid !important;
            }
            
            /* Grid layout adjustments for print */
            .grid {
              page-break-inside: auto !important;
            }
          }
          </style>`;
            
            // Beszúrjuk az Umami analytics scriptet és a CSS patch-et a </head> elé
            const umamiScript = `<script defer src="https://cloud.umami.is/script.js" data-website-id="fb10bb93-a030-4e33-9b3d-05b2abd75d03"></script>`;
            content = content.replace("</head>", `${printCssFix}\n${umamiScript}\n</head>`);
            
            // Írjuk vissza a fájlt
            fs.writeFileSync(filePath, content);
            
            console.log("HTML file successfully modified!");
          '

      - name: Moving resume.html
        run: |
          mkdir -p static/cv
          cp resume/resume.html static/cv/index.html

      - name: Setup Node.js for PDF generation
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate PDF from modified HTML using Puppeteer
        run: |
          npm install puppeteer
          node -e '
            const puppeteer = require("puppeteer");
            const fs = require("fs");
            const path = require("path");
            
            (async () => {
              const browser = await puppeteer.launch({
                headless: true,
                args: ["--no-sandbox", "--disable-setuid-sandbox"]
              });
              
              const page = await browser.newPage();
              const htmlPath = path.join(process.cwd(), "static/cv/index.html");
              const htmlContent = fs.readFileSync(htmlPath, "utf8");
              
              await page.setContent(htmlContent, { waitUntil: "networkidle0" });
              
              await page.pdf({
                path: "static/cv/Zoltan_Horvath_CV.pdf",
                format: "A4",
                printBackground: true,
                margin: {
                  top: "0mm",
                  right: "0mm",
                  bottom: "0mm",
                  left: "0mm"
                }
              });
              
              await browser.close();
              console.log("PDF successfully generated from modified HTML!");
            })();
          '

      - name: Commit published resume files
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -n "$(git status --porcelain static/cv/)" ]; then
            git add static/cv/
            git commit -m "chore(static/cv): update CV files"
            echo "exit_code=0" >> $GITHUB_OUTPUT
          else
            echo "exit_code=1" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        uses: ad-m/github-push-action@master
        if: steps.commit.outputs.exit_code == 0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
