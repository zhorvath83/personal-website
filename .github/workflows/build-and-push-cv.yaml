name: Build and push CV

on:
  push:
    paths:
      - 'resume/resume.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: Devleaps/jsonresume-generator@v1
        id: jsonresume-html-generator
        with:
          action: render
          file: resume.json
          folder: resume/
          output-type: html
          theme-local: false
          theme-name: jsonresume-theme-reactive

      - run: |
          cd resume
          chmod 0777 resume.html
          ls -la

      - name: Modify resume.html
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");

            // Fájl útvonal
            const filePath = path.join(process.cwd(), "resume/resume.html");

            // Olvassuk be a fájlt
            let content = fs.readFileSync(filePath, "utf8");

            // PDF oldaltörés javítás - CSS patch beszúrása
            const printCssFix = `<style>
          @media print {
            /* Remove page-break-inside: avoid from sections to allow proper page breaks */
            section, article {
              page-break-inside: auto !important;
            }

            /* Keep headers with their content */
            h1, h2, h3, h4, h5, h6 {
              page-break-after: avoid !important;
            }

            /* Avoid breaking inside individual work items */
            section > div > article {
              page-break-inside: avoid !important;
            }

            /* Grid layout adjustments for print */
            .grid {
              page-break-inside: auto !important;
            }
          }
          </style>`;

            // Beszúrjuk a CSS patch-et a </head> elé (csak PDF generáláshoz kell)
            content = content.replace("</head>", `${printCssFix}\n</head>`);

            // ============================================
            // CONTACT OBFUSZKÁCIÓ — BOT VÉDELEM
            // ============================================
            // Az email és telefonszám plain text formában nem szerepel a
            // HTML forrásban. A böngésző JS futtatáskor rakja össze őket
            // a DOM-ba, statikus scrapererek ezért nem találják meg.
            //
            // A Puppeteer-rel generált PDF-be az adatok helyesen kerülnek
            // be, mert a PDF generálás előtt a JS végrehajtódik
            // (waitUntil: "networkidle0" biztosítja ezt).
            //
            // Kódolás: btoa(reverse(érték)) — minden adat megfordítva,
            // majd base64-kódolva tárolódik. A protokoll prefix (mailto:,
            // tel:) szintén kódolt, hogy ne legyen árulkodó mintaillesztési
            // pont a forrásban.
            // ============================================

            // E-mail
            const emailObfuscated = `<span id="cv-em"></span><script>(function(){` +
              `var p=[atob("dGNhdG5vYw=="),atob("ZW0ubmF0bG96aHRhdnJvaA==")];` +
              `var r=function(s){return s.split("").reverse().join("")};` +
              `var e=r(p[0])+"@"+r(p[1]);` +
              `var m=atob("bWFpbHRvOg==");` +
              `var q=String.fromCharCode(34);` +
              `var n=document.getElementById("cv-em");` +
              `if(n)n.outerHTML="<a href="+q+m+e+q+">"+e+"<\\/a>";` +
              `})()</script>`;
            content = content.replace(/<a href="mailto:[^"]*">[^<]*<\/a>/, emailObfuscated);

            // Telefonszám

            const phoneObfuscated = `<span id="cv-ph"></span><script>(function(){` +
              `var p=[atob("MjY2MTY0OTAzNjM="),atob("MjY2MSA2NDkgKTAzKCA2Mys=")];` +
              `var r=function(s){return s.split("").reverse().join("")};` +
              `var h=r(p[0]);var d=r(p[1]);` +
              `var m=atob("dGVsOg==");` +
              `var q=String.fromCharCode(34);` +
              `var n=document.getElementById("cv-ph");` +
              `if(n)n.outerHTML="<a href="+q+m+h+q+">"+d+"<\\/a>";` +
              `})()</script>`;
            content = content.replace(/<a href="tel:[^"]*">[^<]*<\/a>/, phoneObfuscated);

            // Írjuk vissza a fájlt
            fs.writeFileSync(filePath, content);

            console.log("HTML file successfully modified!");
          '

      - name: Moving resume.html
        run: |
          mkdir -p static/resume
          cp resume/resume.html static/resume/index.html

      - name: Setup Node.js for PDF generation
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate PDF from modified HTML using Puppeteer
        run: |
          npm install puppeteer
          node -e '
            const puppeteer = require("puppeteer");
            const fs = require("fs");
            const path = require("path");

            (async () => {
              const browser = await puppeteer.launch({
                headless: true,
                args: ["--no-sandbox", "--disable-setuid-sandbox"]
              });

              const page = await browser.newPage();
              const htmlPath = path.join(process.cwd(), "static/resume/index.html");
              const htmlContent = fs.readFileSync(htmlPath, "utf8");

              await page.setContent(htmlContent, { waitUntil: "networkidle0" });

              await page.pdf({
                path: "static/resume/Zoltan_Horvath_CV.pdf",
                format: "A4",
                printBackground: true,
                margin: {
                  top: "0mm",
                  right: "0mm",
                  bottom: "0mm",
                  left: "0mm"
                }
              });

              await browser.close();
              console.log("PDF successfully generated from modified HTML!");
            })();
          '

      - name: Commit published resume files
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -n "$(git status --porcelain static/resume/)" ]; then
            git add static/resume/
            git commit -m "chore(static/resume): update CV files"
            echo "exit_code=0" >> $GITHUB_OUTPUT
          else
            echo "exit_code=1" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        uses: ad-m/github-push-action@master
        if: steps.commit.outputs.exit_code == 0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
