<style>
/* Theme toggle customization: shift slightly right and make 1.6x larger */
.header .logo-switches {
  margin-left: 10px !important;
  margin-top: 1px !important;
}

.header #theme-toggle {
  transform: scale(1.7) !important;
}

/* Mobile adjustments */
@media screen and (max-width: 768px) {
  .header .logo-switches {
    margin-left: 12px !important;
  }
  .header #theme-toggle {
    transform: scale(1.4) !important;
  }
}
</style>

<script>
// PaperMod runtime system theme change listener
(function() {
  // Várunk, amíg a PaperMod betöltődik
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initThemeListener);
  } else {
    initThemeListener();
  }
  
  function initThemeListener() {
    // Figyeljük a rendszer téma változását
    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
    
    function handleThemeChange(e) {
      const prefTheme = localStorage.getItem('pref-theme');
      
      // Csak akkor avatkozunk be, ha auto téma van (vagy nincs beállítva)
      if (prefTheme !== null && prefTheme !== 'auto') {
        return; // Manuális téma van beállítva, ne avatkozzunk bele
      }
      
      const isDark = e.matches;
      
      // Frissítjük a body class-t
      if (isDark) {
        document.body.classList.add('dark');
      } else {
        document.body.classList.remove('dark');
      }
      
      // Frissítjük a theme-toggle ikont
      updateThemeIcon(isDark);
      
      // Triggerelünk egy custom event-et az iframe számára
      window.dispatchEvent(new CustomEvent('theme-changed', { detail: { isDark } }));
      
      console.log('System theme changed to:', isDark ? 'dark' : 'light');
    }
    
    function updateThemeIcon(isDark) {
      const themeToggle = document.getElementById('theme-toggle');
      if (!themeToggle) return;
      
      // SVG ikonok frissítése
      const moonSvg = themeToggle.querySelector('svg[class="moon"]');
      const sunSvg = themeToggle.querySelector('svg[class="sun"]');
      
      if (moonSvg && sunSvg) {
        if (isDark) {
          moonSvg.style.display = 'none';
          sunSvg.style.display = 'block';
        } else {
          moonSvg.style.display = 'block';
          sunSvg.style.display = 'none';
        }
      }
    }
    
    // Listener hozzáadása
    mediaQuery.addEventListener('change', handleThemeChange);
    
    // Első betöltéskor is ellenőrizzük
    handleThemeChange(mediaQuery);
  }
})();
</script>
